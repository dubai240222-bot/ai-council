<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reklama Bot Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  const user = tg.initDataUnsafe?.user;
  document.body.innerHTML = user
    ? `<h2>👋 Привет, ${user.first_name}!</h2>
       <p>ID: ${user.id}</p>
       <p>Mini App работает ✅</p>`
    : `<h2>👋 Привет, тестировщик!</h2>
       <p>Открыто в браузере</p>`;
  tg.MainButton.setText("Открыть кабинет");
  tg.MainButton.show();
</script>
</body>
</html>
